        * {

        body {

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .terminal-card {
            width: 100%;
            max-width: 550px;
            background-color: #0a0a0a;
            border: 1px solid #333;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            overflow: hidden;
        }
        .terminal-header {
            background-color: #111;
            padding: 12px;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .dot.red { background-color: #ff5f56; }
        .dot.yellow { background-color: #ffbd2e; }
        .dot.green { background-color: #27c93f; }
        .title {
            color: #666;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .terminal-body {
            padding: 25px;
        }
        
        /* GİRİŞ PANELİ (LOGIN) DIZAYNI */
        #loginScreen {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .login-title {
            color: #ff3333;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .input-group label {
            color: #888;
            font-size: 0.85rem;
        }
        .terminal-input {
            background-color: #000;
            border: 1px solid #333;
            color: #00ff66;
            padding: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 1rem;
            border-radius: 4px;
            outline: none;
        }
        .terminal-input:focus {
            border-color: #00ff66;
        }
        .login-btn {
            background-color: #ff3333;
            color: #fff;
            border: none;
            padding: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            font-size: 1rem;
            transition: background-color 0.2s;
        }
        .login-btn:hover {
            background-color: #cc0000;
        }
        #errorMsg {
            color: #ff3333;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 5px;
            display: none;
        }
