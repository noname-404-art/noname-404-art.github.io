<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Team | Main Hub</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 20px;
            border: 1px solid #00ff00;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            border-radius: 5px;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ff00;
        }
        p {
            font-size: 1rem;
            color: #888;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: block;
            padding: 12px;
            color: #000;
            background-color: #00ff00;
            text-decoration: none;
            font-weight: bold;
            border-radius: 3px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.4);
        }
        .btn:hover {
            background-color: #000;
            color: #00ff00;
            border: 1px solid #00ff00;
            box-shadow: 0 0 15px #00ff00;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404 TEAM</h1>
        <p>SYSTEM UNDERGROUND HUB</p>
        
        <div class="links">
            <a href="#" class="btn">TELEGRAM BOT</a>
            <a href="#" class="btn">GAME MODS</a>
            <a href="#" class="btn">PROJECTS</a>
        </div>
        
        <div class="footer">
            © 2026 404 Team. All rights reserved.
        </div>
    </div>

</body>
</html>
